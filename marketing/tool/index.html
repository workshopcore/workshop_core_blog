<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Visual Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>📸 Instagram Visual Generator</h1>
            <div class="header-actions">
                <button id="loadFileBtn" class="btn btn-secondary">
                    <span>📁</span> Load JSON
                </button>
                <input type="file" id="fileInput" accept=".json" hidden>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Left Panel: JSON Editor -->
            <section class="panel editor-panel">
                <div class="panel-header">
                    <h2>JSON Definition</h2>
                    <div class="panel-actions">
                        <button id="formatBtn" class="btn btn-small">Format</button>
                        <button id="validateBtn" class="btn btn-small">Validate</button>
                    </div>
                </div>
                <div class="editor-container">
                    <textarea id="jsonEditor" spellcheck="false" placeholder="Paste or load your JSON definition here..."></textarea>
                    <div id="lineNumbers" class="line-numbers"></div>
                </div>
                <div id="errorPanel" class="error-panel hidden">
                    <div class="error-header">
                        <span>⚠️ Errors</span>
                        <button id="closeErrorBtn" class="btn-icon">×</button>
                    </div>
                    <div id="errorContent" class="error-content"></div>
                </div>
            </section>

            <!-- Right Panel: Preview -->
            <section class="panel preview-panel">
                <div class="panel-header">
                    <h2>Preview</h2>
                    <div class="visual-nav">
                        <button id="prevVisualBtn" class="btn btn-small" disabled>◀ Prev</button>
                        <span id="visualIndicator">Visual 1 of 1</span>
                        <button id="nextVisualBtn" class="btn btn-small" disabled>Next ▶</button>
                    </div>
                </div>
                <div class="preview-container">
                    <div id="canvasWrapper" class="canvas-wrapper">
                        <canvas id="previewCanvas"></canvas>
                        <div id="loadingOverlay" class="loading-overlay hidden">
                            <div class="spinner"></div>
                            <span>Rendering...</span>
                        </div>
                    </div>
                </div>
                <div class="preview-actions">
                    <button id="downloadBtn" class="btn btn-primary">
                        <span>⬇️</span> Download Image
                    </button>
                    <button id="downloadAllBtn" class="btn btn-secondary">
                        <span>📦</span> Download All
                    </button>
                </div>
            </section>
        </main>

        <!-- Status Bar -->
        <footer class="status-bar">
            <span id="statusText">Ready</span>
            <span id="dimensionsText"></span>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
