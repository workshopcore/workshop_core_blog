<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #333;
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .item {
            border: 1px solid #555;
            padding: 10px;
            text-align: center;
            background: #222;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 10px;
        }

        .name {
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <h1>Design Analysis Gallery</h1>
    <div class="grid" id="gallery"></div>

    <script>
        const images = [
            "Instagram post - 1.png", "Instagram post - 2-1.png", "Instagram post - 2.png",
            "Instagram post - 3.png", "Instagram post - 4-1.png", "Instagram post - 4.png",
            "Instagram post - 5-1.png", "Instagram post - 5.png", "Instagram post - 6.png",
            "Instagram post - 7.png", "Instagram post - 8.png", "Instagram post - 9.png",
            "Screen 1.png", "Screen 2.png", "Screen 3.png", "Screen 4.png", "Screen 5.png",
            "Story slot notes 2.png", "Story slot notes.png"
        ];

        const container = document.getElementById('gallery');
        images.forEach(file => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<img src="../example_posts/${file}"><div class="name">${file}</div>`;
            container.appendChild(div);
        });
    </script>
</body>

</html>
